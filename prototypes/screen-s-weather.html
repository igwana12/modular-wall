<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mosAIc Screen-S Weather Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #000;
            overflow: hidden;
        }

        #container {
            width: 320px;
            height: 240px;
            margin: 50px auto;
            position: relative;
            border: 2px solid #00D4AA;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0, 212, 170, 0.5);
        }

        #canvas {
            display: block;
        }

        .weather-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            color: #F0F0F0;
        }

        .clock {
            font-size: 48px;
            font-weight: bold;
            color: #00D4AA;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 212, 170, 0.6);
        }

        .weather-main {
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .temperature {
            font-size: 64px;
            font-weight: bold;
            color: #00D4AA;
            text-shadow: 0 2px 15px rgba(0, 212, 170, 0.8);
        }

        .condition {
            font-size: 16px;
            color: #8888AA;
            margin-top: 5px;
        }

        .location {
            font-size: 11px;
            color: #555577;
            text-align: center;
        }

        .info {
            position: absolute;
            bottom: 270px;
            left: 50%;
            transform: translateX(-50%);
            color: #8888AA;
            font-size: 12px;
            text-align: center;
            width: 320px;
        }
    </style>
</head>
<body>
    <div class="info">
        mosAIc Screen-S Weather Widget Prototype<br>
        <span style="color: #00D4AA;">Press R for rain, C for cloudy, S for sunny</span>
    </div>

    <div id="container">
        <canvas id="canvas"></canvas>
        <div class="weather-overlay">
            <div class="clock" id="clock">00:00</div>
            <div class="weather-main">
                <div class="temperature" id="temperature">72°</div>
                <div class="condition" id="condition">Partly Cloudy</div>
            </div>
            <div class="location" id="location">San Francisco, CA</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
    <script>
        // Setup
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 320/240, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
        renderer.setSize(320, 240);
        renderer.setClearColor(0x0D0D1A);

        // Weather shader background
        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                resolution: { value: new THREE.Vector2(320, 240) },
                weatherMode: { value: 1 } // 0=sunny, 1=cloudy, 2=rain
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform float time;
                uniform vec2 resolution;
                uniform int weatherMode;
                varying vec2 vUv;

                // Rain effect
                float rain() {
                    float drops = 0.0;
                    for(float i = 0.0; i < 40.0; i++) {
                        float x = fract(sin(i * 12.9898) * 43758.5453);
                        float y = fract(cos(i * 78.233) * 43758.5453);
                        vec2 pos = vec2(x, fract(y - time * 0.3));
                        float dist = distance(vUv, pos);
                        if(dist < 0.005) drops += 0.8;
                    }
                    return drops;
                }

                // Cloudy gradient
                vec3 cloudy() {
                    float gradient = smoothstep(0.0, 1.0, vUv.y);
                    vec3 dark = vec3(0.05, 0.05, 0.1);
                    vec3 lighter = vec3(0.1, 0.1, 0.15);
                    float wave = sin(vUv.x * 3.0 + time * 0.5) * 0.05;
                    return mix(dark, lighter, gradient + wave);
                }

                // Sunny gradient
                vec3 sunny() {
                    float gradient = smoothstep(0.0, 1.0, vUv.y);
                    vec3 dark = vec3(0.1, 0.08, 0.05);
                    vec3 lighter = vec3(0.2, 0.15, 0.1);
                    return mix(dark, lighter, gradient);
                }

                void main() {
                    vec3 color;

                    if(weatherMode == 2) {
                        // Rain
                        float rainAmount = rain();
                        color = mix(vec3(0.05, 0.05, 0.1), vec3(0.0, 0.83, 0.67), rainAmount);
                    } else if(weatherMode == 1) {
                        // Cloudy
                        color = cloudy();
                    } else {
                        // Sunny
                        color = sunny();
                    }

                    gl_FragColor = vec4(color, 1.0);
                }
            `
        });

        const planeGeometry = new THREE.PlaneGeometry(10, 7.5);
        const backgroundPlane = new THREE.Mesh(planeGeometry, shaderMaterial);
        backgroundPlane.position.z = -2;
        scene.add(backgroundPlane);

        // Update clock
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }

        // Animation loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsed = clock.getElapsedTime();
            shaderMaterial.uniforms.time.value = elapsed;

            renderer.render(scene, camera);
        }

        // Initialize
        updateClock();
        setInterval(updateClock, 1000);
        animate();

        // Keyboard controls for demo
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            const conditionEl = document.getElementById('condition');

            if(key === 'r') {
                shaderMaterial.uniforms.weatherMode.value = 2;
                conditionEl.textContent = 'Rainy';
            } else if(key === 'c') {
                shaderMaterial.uniforms.weatherMode.value = 1;
                conditionEl.textContent = 'Cloudy';
            } else if(key === 's') {
                shaderMaterial.uniforms.weatherMode.value = 0;
                conditionEl.textContent = 'Sunny';
            }
        });

        // Demo: Cycle through weather conditions
        let weatherCycle = 1;
        setInterval(() => {
            weatherCycle = (weatherCycle + 1) % 3;
            shaderMaterial.uniforms.weatherMode.value = weatherCycle;

            const conditions = ['Sunny', 'Cloudy', 'Rainy'];
            document.getElementById('condition').textContent = conditions[weatherCycle];
        }, 10000); // Change every 10 seconds

    </script>
</body>
</html>
